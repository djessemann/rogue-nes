# NES NROM-256 linker configuration for cc65
# 32KB PRG-ROM, 8KB CHR-ROM
# For standalone NES development with none.lib

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0300;
}

MEMORY {
    ZP:       start = $0000,  size = $00FF,  type = rw, define = yes;
    HEADER:   start = $0000,  size = $0010,  type = ro, file = %O, fill = yes;
    PRG:      start = $8000,  size = $7FFA,  type = ro, file = %O, fill = yes, define = yes;
    VECTORS:  start = $FFFA,  size = $0006,  type = ro, file = %O, fill = yes;
    CHR:      start = $0000,  size = $2000,  type = ro, file = %O, fill = yes;
    STACK:    start = $0100,  size = $0100,  type = rw, define = yes;
    OAMBUF:   start = $0200,  size = $0100,  type = rw, define = yes;
    RAM:      start = $0300,  size = $0500,  type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,              type = zp;
    HEADER:   load = HEADER,          type = ro;
    STARTUP:  load = PRG,             type = ro,  define = yes;
    LOWCODE:  load = PRG,             type = ro,  optional = yes;
    ONCE:     load = PRG,             type = ro,  optional = yes;
    CODE:     load = PRG,             type = ro,  define = yes;
    RODATA:   load = PRG,             type = ro,  define = yes;
    DATA:     load = PRG, run = RAM,  type = rw,  define = yes;
    VECTORS:  load = VECTORS,         type = ro;
    CHARS:    load = CHR,             type = ro;
    BSS:      load = RAM,             type = bss, define = yes;
}
